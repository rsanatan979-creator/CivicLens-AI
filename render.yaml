services:
  # 1. FastAPI AI Diagnostics Microservice
  - type: web
    name: civiclens-ai-service
    env: python
    rootDir: ai-service
    buildCommand: pip install fastapi uvicorn google-genai pydantic requests
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # You will enter this in the Render dashboard

  # 2. Unified Web Application (Frontend + Express API Gateway)
  - type: web
    name: civiclens-web-app
    env: node
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema=backend/prisma/schema.prisma && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: civiclens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          name: civiclens-ai-service
          value: url
      - key: NODE_ENV
        value: production

databases:
  # 3. PostgreSQL Database
  - name: civiclens-db
    databaseName: civic_agent
