global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'civicagent-backend'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'civicagent-ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8000']
