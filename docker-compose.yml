version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=super-secure-production-jwt-signing-secret-key-999
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SQL_HOST=db
      - SQL_USER=user
      - SQL_PASSWORD=password
      - SQL_DB_NAME=civic_agent
      - DATABASE_URL=postgresql://user:password@db:5432/civic_agent
      - AI_SERVICE_URL=http://ai-service:8000
      - ALLOWED_ORIGINS=*
    depends_on:
      - db
      - ai-service

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../Dockerfile.ai-service
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=civic_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
