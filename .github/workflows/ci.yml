name: CivicAgent CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linting Checks
      run: npm run lint

    - name: Run Test Suite
      env:
        NODE_ENV: test
        JWT_SECRET: ci-pipeline-test-signing-key-placeholder-987654321
      run: npm run test
